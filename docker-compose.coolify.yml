services:
  hermes-gateway:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    volumes:
      - hermes_data:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID}
      - HERMES_GID=${HERMES_GID}
      # Providers API KEYs
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - ZAI_API_KEY={ZAI_API_KEY}
      - MINIMAX_API_KEY={MINIMAX_API_KEY}
      - HERMES_OPENROUTER_CACHE=${HERMES_OPENROUTER_CACHE}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENCODE_GO_API_KEY=${OPENCODE_GO_API_KEY}
      - OPENCODE_ZEN_API_KEY=${OPENCODE_ZEN_API_KEY}
      # Tools
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HASS_TOKEN=${HASS_TOKEN}
      - HASS_URL=${HASS_URL}
      # OAuth
      - HERMES_INFERENCE_PROVIDER=${HERMES_INFERENCE_PROVIDER}
      - HERMES_TIMEZONE=${HERMES_TIMEZONE}
      # Messaging
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - TELEGRAM_REACTIONS=${TELEGRAM_REACTIONS}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_ALLOWED_USERS=${SLACK_ALLOWED_USERS}
      - SLACK_HOME_CHANNEL=${SLACK_HOME_CHANNEL}
      - SLACK_HOME_CHANNEL_NAME=${SLACK_HOME_CHANNEL_NAME}
      - WHATSAPP_ENABLED=${WHATSAPP_ENABLED}
      - WHATSAPP_MODE=${WHATSAPP_MODE}
      - WHATSAPP_ALLOWED_USERS=${WHATSAPP_ALLOWED_USERS}
      - WHATSAPP_ALLOW_ALL_USERS=${WHATSAPP_ALLOW_ALL_USERS}
      - WHATSAPP_DEBUG=${WHATSAPP_DEBUG}
      # Agent behaviour
      - HERMES_YOLO_MODE=${HERMES_YOLO_MODE}
      - HERMES_QUIET=${HERMES_QUIET}
      - HERMES_BUNDLED_SKILLS=${HERMES_BUNDLED_SKILLS}
    command: ["gateway", "run"]
    expose:
      - "8642"

volumes:
  hermes_data:
